apiVersion: v1
kind: Namespace
metadata:
  name: scaler

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apploader
  namespae: scaler
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: prateekkumawat/niteshclass:webapp1
        resources:
          requests: 
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "400m"
        ports:
        - containerPort: 80

---
kind: Service
apiVersion: v1
metadata:
  name: scaler-svc
  namespace: scaler
spec:
  selector:
    app: myapp
  type: NodePort
  ports:
  - name: http
    port:  80
    targetPort:  80