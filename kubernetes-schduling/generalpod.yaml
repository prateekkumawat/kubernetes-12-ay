apiVersion: v1
kind: Pod
metadata:
  name: myapp3
  labels:
    app.kubernetes.io/name: myapp3
spec:
  containers:
  - name: myapp3
    image: nginx
    resources:
      requests: 
        memory: "100Mi"
        cpu: "200m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
 